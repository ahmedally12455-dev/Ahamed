<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earn Points App</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    padding:20px;
    background:#f5f5f5;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

button{
    background:#0088cc;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
}

.points{
    font-size:24px;
    font-weight:bold;
}
</style>
</head>

<body>

<h2>💰 Earn Points</h2>

<div class="card">
    <div class="points">
        Points: <span id="points">0</span>
    </div>
</div>

<div class="card">
    <h3>🎥 Watch Video</h3>
    <p>Watch a video and earn 10 points.</p>

    <button onclick="watchVideo()">
        Watch Video
    </button>
</div>

<div class="card">
    <h3>📋 Complete Task</h3>
    <p>Join a Telegram channel and earn 20 points.</p>

    <button onclick="completeTask()">
        Complete Task
    </button>
</div>

<script>

let points = localStorage.getItem("points") || 0;
document.getElementById("points").innerText = points;

function updatePoints(value){
    points = parseInt(points) + value;
    localStorage.setItem("points", points);
    document.getElementById("points").innerText = points;
}

function watchVideo(){

    window.open(
        "https://www.youtube.com/watch?v=dQw4w9WgXcQ",
        "_blank"
    );

    setTimeout(()=>{
        updatePoints(10);
        alert("You earned 10 points!");
    },10000);
}

function completeTask(){

    window.open(
        "https://t.me/yourchannel",
        "_blank"
    );

    setTimeout(()=>{
        updatePoints(20);
        alert("You earned 20 points!");
    },5000);
}

</script>

</body>
</html>
